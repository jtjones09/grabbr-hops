# Build pre-built hops binaries and publish them to a GitHub Release.
#
# Trigger: push a version tag (e.g. `git tag v0.11.0 && git push origin v0.11.0`),
# or run it by hand from the Actions tab ("Run workflow").
#
# Produces, per release:
#   - hops-macos-universal.dmg       (Intel + Apple Silicon GUI app — SIGNED +
#                                     notarized when the macOS signing secrets are
#                                     configured; see docs/SIGNING.md)
#   - hops-macos-universal.tar.gz    (the bare universal CLI binary; unsigned)
#   - hops-windows-x86_64.zip        (GUI build)
#   - hops-linux-x86_64.tar.gz       (daemon + terminal UI; the Slint GUI on Linux
#                                     needs desktop libs, so the Linux artifact is
#                                     TUI-only for a reliable, dependency-light build)
#
# The macOS .dmg is signed + notarized when the MACOS_* secrets are present (it
# then opens with no Gatekeeper warning). Without those secrets — e.g. on a fork —
# the signing steps are skipped and only the unsigned artifacts are produced.
# Windows signing is still a TODO (see the marker below).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.name }}
    # Surfaced so the macOS signing steps can gate on "are the secrets set?"
    # (secrets aren't allowed directly in `if:`, but job env is).
    env:
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   name: macos-universal,  features: "tui slint" }
          - { os: windows-latest, name: windows-x86_64,    features: "tui slint" }
          - { os: ubuntu-latest,  name: linux-x86_64,      features: "tui" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # so build.rs can read the git commit

      - uses: dtolnay/rust-toolchain@stable

      # --- build ---
      - name: Build (macOS universal)
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --release --no-default-features --features "${{ matrix.features }}" --target aarch64-apple-darwin
          cargo build --release --no-default-features --features "${{ matrix.features }}" --target x86_64-apple-darwin
          mkdir -p dist
          lipo -create -output dist/hops \
            target/aarch64-apple-darwin/release/hops \
            target/x86_64-apple-darwin/release/hops
          # bare universal CLI binary (unsigned; for headless / daemon use)
          tar -C dist -czf hops-${{ matrix.name }}.tar.gz hops

      # Sign + notarize a .dmg when the signing secrets are configured
      # (docs/SIGNING.md). Skipped automatically on forks/PRs without the
      # secrets — the unsigned .tar.gz above is still produced either way.
      - name: Import Developer ID certificate (macOS)
        if: runner.os == 'macOS' && env.MACOS_CERT_P12 != ''
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}

      - name: Package + sign + notarize macOS .dmg
        if: runner.os == 'macOS' && env.MACOS_CERT_P12 != ''
        env:
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
          MACOS_NOTARY_KEY_B64: ${{ secrets.MACOS_NOTARY_KEY }}
        run: |
          scripts/package-macos.sh dist/hops "$RUNNER_TEMP/dist"
          KEYFILE="$RUNNER_TEMP/notary_key.p8"
          printf '%s' "$MACOS_NOTARY_KEY_B64" | base64 --decode > "$KEYFILE"
          NOTARY_KEY="$KEYFILE" scripts/sign-macos.sh "$RUNNER_TEMP/dist"
          rm -f "$KEYFILE"
          cp "$RUNNER_TEMP/dist/hops-macos.dmg" "hops-${{ matrix.name }}.dmg"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cargo build --release --no-default-features --features "${{ matrix.features }}"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\hops.exe dist\hops.exe
          # TODO(signing): signtool sign /fd SHA256 /tr <timestamp-url> /td SHA256 /a dist\hops.exe
          Compress-Archive -Path dist\hops.exe -DestinationPath hops-${{ matrix.name }}.zip

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          cargo build --release --no-default-features --features "${{ matrix.features }}"
          mkdir -p dist
          cp target/release/hops dist/hops
          tar -C dist -czf hops-${{ matrix.name }}.tar.gz hops

      - uses: actions/upload-artifact@v4
        with:
          name: hops-${{ matrix.name }}
          path: hops-${{ matrix.name }}.*

  release:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
